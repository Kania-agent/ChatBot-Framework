<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot Framework</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🤖 ChatBot</h2>
                <button id="newChatBtn" title="New Chat">+</button>
            </div>
            <div class="model-selector">
                <label for="modelSelect">Personality</label>
                <select id="modelSelect">
                    <option value="helpful">🟢 Helpful Assistant</option>
                    <option value="pirate">🏴‍☠️ Pirate Captain</option>
                    <option value="wizard">🧙 Wizard Sage</option>
                    <option value="robot">🤖 Robot Logic</option>
                    <option value="poet">📜 Poetic Soul</option>
                    <option value="detective">🔍 Detective</option>
                </select>
            </div>
            <div id="chatHistory" class="chat-history"></div>
            <div class="sidebar-footer">
                <button id="clearAllBtn">🗑️ Clear All</button>
            </div>
        </aside>
        <main class="chat-main">
            <div class="chat-header">
                <h3 id="chatTitle">New Chat</h3>
                <span id="modelName" class="model-badge">Helpful Assistant</span>
            </div>
            <div id="messages" class="messages">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>Welcome to ChatBot Framework</h1>
                    <p>Choose a personality and start chatting!</p>
                    <div class="suggestions" id="suggestions"></div>
                </div>
            </div>
            <div id="typingIndicator" class="typing-indicator hidden">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
            <form id="chatForm" class="chat-input-area">
                <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
                <button type="submit" id="sendBtn">➤</button>
            </form>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
